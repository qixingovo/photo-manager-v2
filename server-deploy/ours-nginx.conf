# ours.qixingovo.cn — 情侣相册
server {
    listen 80;
    server_name ours.qixingovo.cn;
    return 301 https://$server_name$request_uri;
}

server {
    server_name ours.qixingovo.cn;
    root /var/www/photo-manager;
    index index.html index-mobile.html;

    location /.well-known/acme-challenge/ { root /var/www/photo-manager; }
    location /rest/v1/ { proxy_pass http://127.0.0.1:3001/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /auth/v1/ { proxy_pass http://127.0.0.1:3004/auth/v1/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /storage/v1/ { proxy_pass http://127.0.0.1:3004/storage/v1/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; client_max_body_size 25m; }
    location / { try_files $uri $uri/ /index.html; }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/www.qixingovo.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.qixingovo.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
}
