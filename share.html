<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>📷 照片分享</title>
    <meta name="theme-color" content="#667eea">
    <link rel="stylesheet" href="style.css?v=45">

    <script src="config.js"></script>

<body class="share-page">
    <div class="share-header">
        <h1>📷 照片分享</h1>
