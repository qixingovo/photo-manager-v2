<h2>忌口打卡 — 首页浮窗形式</h2>
<p class="subtitle">忌口窗口期内，首页右下角出现小浮窗，平时不显示</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">平时 — 无浮窗</div>
    <div class="mockup-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
        <div style="background:#F0F4FF;border-radius:10px;padding:14px;text-align:center;font-size:12px;">📸<br>照片</div>
        <div style="background:#FFF5F0;border-radius:10px;padding:14px;text-align:center;font-size:12px;">🎮<br>游戏</div>
        <div style="background:#F0FFF4;border-radius:10px;padding:14px;text-align:center;font-size:12px;">💬<br>碎碎念</div>
        <div style="background:#FFF0F5;border-radius:10px;padding:14px;text-align:center;font-size:12px;">📅<br>纪念日</div>
        <div style="background:#F5F0FF;border-radius:10px;padding:14px;text-align:center;font-size:12px;">🗺️<br>地图</div>
        <div style="background:#FFF9F0;border-radius:10px;padding:14px;text-align:center;font-size:12px;">🩸<br>周期</div>
      </div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">忌口窗口 — 浮窗出现</div>
    <div class="mockup-body" style="position:relative;min-height:280px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;opacity:0.7;">
        <div style="background:#F0F4FF;border-radius:10px;padding:14px;text-align:center;font-size:12px;">📸<br>照片</div>
        <div style="background:#FFF5F0;border-radius:10px;padding:14px;text-align:center;font-size:12px;">🎮<br>游戏</div>
        <div style="background:#F0FFF4;border-radius:10px;padding:14px;text-align:center;font-size:12px;">💬<br>碎碎念</div>
        <div style="background:#FFF0F5;border-radius:10px;padding:14px;text-align:center;font-size:12px;">📅<br>纪念日</div>
        <div style="background:#F5F0FF;border-radius:10px;padding:14px;text-align:center;font-size:12px;">🗺️<br>地图</div>
        <div style="background:#FFF9F0;border-radius:10px;padding:14px;text-align:center;font-size:12px;">🩸<br>周期</div>
      </div>
      <!-- 浮窗 -->
      <div style="position:absolute;bottom:8px;right:8px;background:linear-gradient(135deg,#FFF5F7,#FFE0E6);border:1.5px solid #E84A6B;border-radius:16px;padding:12px 16px;box-shadow:0 4px 16px rgba(232,74,107,0.25);cursor:pointer;z-index:10;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:28px;">🍽️</div>
          <div>
            <div style="font-weight:700;font-size:14px;color:#E84A6B;">忌口打卡</div>
            <div style="font-size:11px;color:#E84A6B;">今日待完成</div>
          </div>
          <div style="background:#E84A6B;color:#fff;font-size:11px;padding:2px 6px;border-radius:8px;animation:pulse 2s infinite;">●</div>
        </div>
      </div>
    </div>
  </div>
</div>
