<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📷 回忆</title>
    <link rel="stylesheet" href="mobile.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1"></script>
</head>
<body>
    <!-- ========== 登录页面 ========== -->
    <div id="loginPage" class="page active">
        <div class="login-card">
            <div class="login-header">
                <span class="login-icon">📷</span>
                <h1>老大和小弟的回忆</h1>
                <p>回忆我们的从前</p>
            </div>
            <form id="loginForm" onsubmit="mobile.handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="账号" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="密码" required>
                </div>
                <p id="loginError" class="error-msg"></p>
                <button type="submit" class="btn-primary">登录</button>
            </form>
        </div>
    </div>

    <!-- ========== 主页 - 照片流 ========== -->
    <div id="homePage" class="page">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="logo">
                <span>📷</span>
                <span>回忆</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn" onclick="mobile.refreshData()">🔄</button>
                <button class="icon-btn" onclick="mobile.toggleSearch()">🔍</button>
            </div>
        </header>

        <!-- 分类路径显示 -->
        <div id="categoryPathDisplay" class="category-path-display" style="display:none;"></div>

        <!-- 搜索栏（可折叠） -->
        <div id="searchBar" class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索照片..." oninput="mobile.searchPhotos()">
            <select id="mobileFilterCategory" onchange="mobile.filterByCategory()">
                <option value="all">全部</option>
            </select>
        </div>

        <!-- 照片操作栏 -->
        <div class="photo-actions-bar">
            <button id="selectModeBtn" class="btn-secondary" onclick="mobile.toggleSelectMode()">☑️ 多选</button>
            <div id="batchActions" class="batch-actions" style="display:none;">
                <button id="selectAllBtn" class="btn-secondary" onclick="mobile.selectAllPhotos()">全选</button>
                <button id="batchFavoriteBtn" class="btn-secondary" onclick="mobile.batchToggleFavorite()">❤️ 收藏 (<span id="selectedCount">0</span>)</button>
                <button id="batchDeleteBtn" class="btn-danger" onclick="mobile.batchDeletePhotos()">🗑️ 删除</button>
            </div>
        </div>

        <!-- 照片瀑布流 -->
        <main class="photo-feed" id="photoFeed">
            <!-- 照片卡片会动态插入 -->
        </main>
        
        <!-- 加载更多按钮 -->
        <div id="loadMoreContainer" class="load-more-container"></div>

        <!-- 分页控件 -->
        <div id="paginationControls" class="pagination-bar">
            <span style="color:red;">分页加载中...</span>
        </div>

        <div id="emptyFeed" class="empty-state" style="display:none;">
            <span class="empty-icon">📭</span>
            <p>还没有照片</p>
            <small>上传一些照片开始吧</small>
        </div>
    </div>

    <!-- ========== 上传页面 ========== -->
    <div id="uploadPage" class="page">
        <header class="top-bar">
            <div class="logo">
                <span>📤</span>
                <span>上传</span>
            </div>
            <button class="icon-btn" onclick="mobile.refreshData()">🔄</button>
        </header>

        <div class="upload-card">
            <!-- 拖拽/点击上传区域 -->
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('photoInput').click()">
                <input type="file" id="photoInput" accept="image/*" multiple hidden onchange="mobile.handleFileSelect(event)">
                <div class="upload-hint">
                    <span class="upload-icon">📤</span>
                    <p>点击选择照片</p>
                    <small>或拖放到这里</small>
                </div>
            </div>

            <!-- 预览区域 -->
            <div id="previewArea" class="preview-area" style="display:none;">
                <div id="previewGrid" class="preview-grid"></div>
                <button class="btn-text" onclick="mobile.clearPreviews()">清除全部</button>
            </div>

            <!-- 上传表单 -->
            <div class="upload-form">
                <!-- 级联分类选择器 -->
                <div class="form-item">
                    <label>分类</label>
                    <div id="mobileUploadCategoryCascade" class="cascade-container"></div>
                    <button class="btn-text" id="useLastCategoryBtn" style="display:none;" onclick="mobile.useLastUploadCategory()">📂 使用上次分类</button>
                </div>
                <div class="form-item">
                    <label>名称前缀</label>
                    <input type="text" id="mobilePhotoName" placeholder="可选，用于批量命名">
                </div>
                <div class="form-item">
                    <label>描述</label>
                    <textarea id="mobilePhotoDesc" placeholder="optional" rows="2"></textarea>
                </div>

                <!-- 上传进度 -->
                <div id="uploadProgress" class="progress-section" style="display:none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="progressText">0%</span>
                </div>

                <button id="uploadBtn" class="btn-primary btn-full" onclick="mobile.uploadPhotos()">
                    上传照片
                </button>
            </div>
        </div>
    </div>

    <!-- ========== 分类页面 ========== -->
    <div id="categoryPage" class="page">
        <header class="top-bar">
            <div class="logo">
                <span>📁</span>
                <span>分类</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn" onclick="mobile.refreshData()">🔄</button>
                <button class="icon-btn" onclick="mobile.showAddCategory()">➕</button>
            </div>
        </header>

        <!-- 添加分类弹窗 -->
        <div id="addCategoryModal" class="modal-overlay" style="display:none;">
            <div class="modal-card">
                <h3>添加分类</h3>
                <div class="form-item">
                    <input type="text" id="newCategoryName" placeholder="分类名称">
                </div>
                <div class="form-item">
                    <label style="font-size:13px;color:#666;margin-bottom:6px;display:block;">父分类（可选）</label>
                    <div id="parentCategoryCascade" class="cascade-container"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="mobile.closeAddCategory()">取消</button>
                    <button class="btn-primary" onclick="mobile.createCategory()">添加</button>
                </div>
            </div>
        </div>

        <!-- 分类列表 -->
        <div id="categoryList" class="category-list">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- ========== 我的页面 ========== -->
    <div id="profilePage" class="page">
        <header class="top-bar">
            <div class="logo">
                <span>👤</span>
                <span>我的</span>
            </div>
        </header>

        <div class="profile-card">
            <div class="profile-avatar" id="userAvatar">👤</div>
            <div class="profile-info">
                <h2 id="userName">用户</h2>
                <p id="userRole">角色</p>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-item" onclick="mobile.toggleFavorites()">
                <span class="menu-icon">❤️</span>
                <span class="menu-text">我的收藏</span>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="mobile.showMarkedCategories()">
                <span class="menu-icon">⭐</span>
                <span class="menu-text">已标记分类</span>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="mobile.showSettings()">
                <span class="menu-icon">⚙️</span>
                <span class="menu-text">设置</span>
                <span class="menu-arrow">›</span>
            </div>
        </div>

        <button class="btn-danger btn-full" onclick="mobile.handleLogout()">退出登录</button>
    </div>

    <!-- ========== 照片详情页 ========== -->
    <div id="detailPage" class="page">
        <header class="top-bar transparent">
            <button class="icon-btn light" onclick="mobile.closeDetail()">←</button>
            <button class="icon-btn light" id="detailFavoriteBtn" onclick="mobile.toggleFavorite()">🤍</button>
        </header>

        <div class="detail-image-container">
            <img id="detailImage" src="" alt="">
        </div>

        <div class="detail-panel">
            <div class="detail-header">
                <h2 id="detailName">照片名称</h2>
                <button class="btn-icon" onclick="mobile.openEditModal()">✏️</button>
            </div>
            <p id="detailDesc" class="detail-desc"></p>
            <div class="detail-meta">
                <span id="detailCategory" class="tag">分类</span>
                <span id="detailSize" class="meta-text"></span>
            </div>

            <!-- 留言区 -->
            <div class="comments-section">
                <h4>留言</h4>
                <div id="commentsList" class="comments-list"></div>
                <form id="mobileCommentForm" class="comment-form" onsubmit="mobile.addComment(event)">
                    <input type="text" id="mobileCommentInput" placeholder="写留言...">
                    <button type="submit">发送</button>
                </form>
            </div>

            <!-- 操作按钮 -->
            <div class="detail-actions">
                <button class="btn-secondary" onclick="mobile.downloadPhoto()">⬇️ 下载</button>
                <button class="btn-secondary" onclick="mobile.openCategoryModal()">📁 改分类</button>
                <button class="btn-danger" onclick="mobile.deletePhoto()">🗑️ 删除</button>
            </div>
        </div>
    </div>

    <!-- ========== 改分类弹窗 ========== -->
    <div id="categoryModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>更改分类</h3>
            <p class="modal-hint">级联选择</p>
            <div id="detailCategoryCascade" class="cascade-container"></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="mobile.closeCategoryModal()">取消</button>
                <button class="btn-primary" onclick="mobile.saveCategoryChange()">保存</button>
            </div>
        </div>
    </div>

    <!-- ========== 编辑弹窗 ========== -->
    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>编辑照片</h3>
            <div class="form-item">
                <label>名称</label>
                <input type="text" id="editPhotoName">
            </div>
            <div class="form-item">
                <label>描述</label>
                <textarea id="editPhotoDesc" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="mobile.closeEditModal()">取消</button>
                <button class="btn-primary" onclick="mobile.saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <!-- ========== 确认删除弹窗 ========== -->
    <div id="confirmModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3 id="confirmTitle">确认删除</h3>
            <p id="confirmMessage" style="text-align:center;color:#666;margin-bottom:20px;"></p>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="mobile.closeConfirmModal()">取消</button>
                <button class="btn-danger" onclick="mobile.confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <!-- ========== 已标记分类面板 ========== -->
    <div id="markedPanel" class="bottom-sheet" style="display:none;">
        <div class="sheet-header">
            <h3>已标记分类 ⭐</h3>
            <button class="icon-btn" onclick="mobile.closeMarkedPanel()">×</button>
        </div>
        <div id="markedCategoriesList" class="marked-list"></div>
    </div>
    <div id="sheetOverlay" class="sheet-overlay" style="display:none;" onclick="mobile.closeMarkedPanel()"></div>

    <!-- ========== 底部导航 ========== -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-item active" data-page="home" onclick="mobile.switchTab('home')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </div>
        <div class="nav-item" data-page="upload" onclick="mobile.switchTab('upload')">
            <span class="nav-icon">📤</span>
            <span class="nav-label">上传</span>
        </div>
        <div class="nav-item" data-page="category" onclick="mobile.switchTab('category')">
            <span class="nav-icon">📁</span>
            <span class="nav-label">分类</span>
        </div>
        <div class="nav-item" data-page="profile" onclick="mobile.switchTab('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">我的</span>
        </div>
    </nav>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <script type="module" src="mobile-app.js"></script>
</body>
</html>
