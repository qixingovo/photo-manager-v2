<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📷 照片分类管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h1>📷 老大和小弟的回忆管理系统</h1>
            <p class="subtitle">回忆我们的从前</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="loginUsername" required placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
                <p id="loginError" class="login-error"></p>
            </form>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display:none;">
        <header>
            <h1>📷 老大和小弟的回忆管理系统</h1>
            <p class="subtitle">回忆我们的从前</p>
        </header>

        <!-- 上传区域 -->
        <section class="upload-section">
            <h2>上传照片</h2>
            <form id="uploadForm" class="upload-form">
                <div class="form-row">
                    <input type="file" id="photoInput" accept="image/*" multiple required>
                    <select id="categorySelect" class="category-select">
                        <option value="">选择分类（可选）</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="text" id="photoName" placeholder="照片名称前缀（可选，用于批量命名）">
                    <input type="text" id="photoDesc" placeholder="照片描述（可选）">
                </div>
                <button type="submit" class="btn btn-primary">上传</button>
                <div id="uploadProgress" class="upload-progress" style="display:none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="progressText">0%</span>
                </div>
            </form>
        </section>

        <!-- 分类管理 -->
        <section class="category-section">
            <h2>分类管理</h2>
            <div class="category-controls">
                <input type="text" id="newCategory" placeholder="新分类名称">
                <select id="parentCategorySelect" class="category-select">
                    <option value="">作为顶级分类</option>
                </select>
                <button onclick="window.createCategory()" class="btn btn-secondary">添加分类</button>
            </div>
            <div id="categoryList" class="category-list"></div>
        </section>

        <button onclick="handleLogout()" class="btn btn-secondary" style="position:fixed;top:20px;right:20px;z-index:100;">退出登录</button>

        <!-- 照片浏览 -->
        <section class="photos-section">
            <div class="photos-header">
                <h2 id="photosTitle">照片浏览</h2>
                <div class="photos-controls">
                    <input type="text" id="searchInput" placeholder="🔍 搜索照片...">
                    <select id="filterCategory" onchange="onCategoryFilterChange()">
                        <option value="all">全部分类</option>
                    </select>
                    <button id="selectModeBtn" onclick="toggleSelectMode()" class="btn btn-secondary">☑️ 多选</button>
                    <button id="selectAllBtn" onclick="selectAllPhotos()" class="btn btn-secondary" style="display:none;">全选</button>
                    <button id="batchCategoryBtn" onclick="openBatchCategoryModal()" class="btn btn-secondary" style="display:none;">📁 批量改分类</button>
                    <button id="batchDeleteBtn" onclick="batchDeletePhotos()" class="btn btn-danger" style="display:none;">🗑️ 删除 (<span id="selectedCount">0</span>)</button>
                    <button id="favoritesFilterBtn" onclick="toggleFavoritesFilter()" class="btn btn-secondary">❤️ 收藏</button>
                </div>
            </div>
            <div id="photoGrid" class="photo-grid"></div>
            <div id="emptyState" class="empty-state" style="display:none;">
                <p>📭 暂无照片</p>
                <small>上传一些照片开始管理吧</small>
            </div>
        </section>
    </div>

    <!-- 照片详情弹窗 -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h3 id="modalPhotoName"></h3>
                    <p id="modalPhotoDesc"></p>
                    <div class="modal-meta">
                        <span id="modalPhotoCategory" class="photo-category"></span>
                        <small id="modalPhotoSize"></small>
                    </div>
                    <div class="modal-actions">
                        <button id="favoriteBtn" onclick="toggleFavorite()" class="btn btn-secondary">🤍 收藏</button>
                        <a id="modalDownloadBtn" href="" download class="btn btn-primary">⬇️ 下载</a>
                        <button onclick="openEditModal()" class="btn btn-secondary">✏️ 编辑</button>
                        <button onclick="openCategoryModal()" class="btn btn-secondary">📁 改分类</button>
                    </div>
                    <div class="modal-comments">
                        <h4>留言</h4>
                        <div id="commentsList" class="comments-list"></div>
                        <form id="commentForm" onsubmit="addComment(event)">
                            <input type="text" id="commentInput" placeholder="写下你的留言...">
                            <button type="submit" class="btn btn-secondary">发送</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="closeEditModal()">&times;</span>
            <h3>编辑照片信息</h3>
            <form id="editForm" class="edit-form">
                <input type="hidden" id="editPhotoId">
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="editDesc" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 改分类弹窗 -->
    <div id="categoryModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="closeCategoryModal()">&times;</span>
            <h3>更改分类</h3>
            <p style="font-size:12px;color:#666;margin-bottom:10px;">可选择多个分类</p>
            <div class="category-select-list">
                <label class="category-option">
                    <input type="checkbox" id="noCategoryCheck">
                    <span>未分类</span>
                </label>
                <div id="categoryCheckboxList"></div>
            </div>
            <button onclick="saveCategoryChange()" class="btn btn-primary">保存</button>
        </div>
    </div>

    <!-- 编辑分类弹窗 -->
    <div id="editCategoryModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="closeEditCategoryModal()">&times;</span>
            <h3>编辑分类</h3>
            <form id="editCategoryForm" onsubmit="saveCategoryName(event)">
                <input type="hidden" id="editCategoryId">
                <div class="form-group">
                    <label>分类名称</label>
                    <input type="text" id="editCategoryName" required>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 批量改分类弹窗 -->
    <div id="batchCategoryModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="closeBatchCategoryModal()">&times;</span>
            <h3>批量更改分类</h3>
            <p style="font-size:12px;color:#666;margin-bottom:10px;">为选中的 <span id="batchPhotoCount">0</span> 张照片设置分类</p>
            <div class="category-select-list">
                <label class="category-option">
                    <input type="checkbox" id="batchNoCategory">
                    <span>设为未分类</span>
                </label>
                <div id="batchCategoryList"></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button onclick="batchAddCategories()" class="btn btn-primary" style="flex:1;">添加分类</button>
                <button onclick="batchRemoveCategories()" class="btn btn-danger" style="flex:1;">移除选中分类</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
