<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📷 照片分类管理</title>
    <meta name="theme-color" content="#A8D8EA">
    <link rel="manifest" href="manifest.json">
    <script>
    if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        window.location.href = 'index-mobile.html';
    }
    </script>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h1>📷 老大和小弟的回忆管理系统</h1>
            <p class="subtitle">回忆我们的从前</p>
            <form id="loginForm" onsubmit="window.handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">账号</label>
                    <input type="text" id="loginUsername" required placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
                <p id="loginError" class="login-error"></p>
            </form>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display:none;">
        <header>
            <h1>📷 老大和小弟的回忆管理系统</h1>
            <p class="subtitle">回忆我们的从前</p>
        </header>

        <!-- 顶部导航栏 -->
        <nav class="top-nav" id="topNav">
            <div class="nav-section" onclick="window.toggleSection('upload')">
                <span class="nav-icon">📤</span>
                <span class="nav-text">上传照片</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-section" onclick="window.toggleSection('category')">
                <span class="nav-icon">📁</span>
                <span class="nav-text">分类管理</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-section" onclick="window.toggleSection('map')">
                <span class="nav-icon">🗺️</span>
                <span class="nav-text">我们的地图</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-section" onclick="window.toggleSection('timeline')">
                <span class="nav-icon">💝</span>
                <span class="nav-text">纪念日</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-section" onclick="window.refreshData()">
                <span class="nav-icon">🔄</span>
                <span class="nav-text">刷新</span>
            </div>
        </nav>

        <!-- 右侧标记分类浮窗 -->
        <div class="marked-widget" id="markedWidget" onclick="window.toggleMarkedCategories(event)">
            <!-- 收起状态 -->
            <div class="marked-collapsed">
                <span>⭐</span>
                <span>已标记</span>
            </div>
            <!-- 展开状态 -->
            <div class="marked-content" onclick="event.stopPropagation()">
                <div class="marked-header">已标记的分类 ⭐</div>
                <div id="markedCategoriesList" class="marked-list"></div>
            </div>
        </div>

        <!-- 上传区域 -->
        <section class="upload-section" id="uploadSection" style="display:none;">
            <h2>上传照片</h2>
            <form id="uploadForm" class="upload-form">
                <div class="form-row">
                    <input type="file" id="photoInput" accept="image/*" multiple required>
                </div>
                <div class="form-row">
                    <input type="text" id="photoName" placeholder="照片名称前缀（可选，用于批量命名）">
                    <input type="text" id="photoDesc" placeholder="照片描述（可选）">
                </div>
                <!-- 级联分类选择器 -->
                <div id="uploadCategoryCascade" class="cascade-select"></div>
                <div class="form-row" style="margin-top:8px;">
                    <input type="text" id="photoLocationName" placeholder="📍 地点名称（如：北京故宫）" style="flex:1;">
                    <input type="number" id="photoLatitude" placeholder="纬度" step="any" style="width:120px;">
                    <input type="number" id="photoLongitude" placeholder="经度" step="any" style="width:120px;">
                    <button type="button" class="btn btn-secondary" onclick="window.pickLocationOnMap()" style="white-space:nowrap;">📍 地图选点</button>
                </div>
                <button type="submit" class="btn btn-primary">上传</button>
                <div id="uploadProgress" class="upload-progress" style="display:none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="progressText">0%</span>
                </div>
            </form>
        </section>

        <!-- 分类管理 -->
        <section class="category-section" id="categorySection" style="display:none;">
            <h2>分类管理</h2>
            <div class="category-controls">
                <input type="text" id="newCategory" placeholder="新分类名称">
                <div id="parentCategoryCascade" class="cascade-select"></div>
                <button onclick="window.createCategory()" class="btn btn-secondary">添加分类</button>
            </div>
            <div id="categoryList" class="category-list"></div>
        </section>

        <!-- 我们的地图 -->
        <section class="map-section" id="mapSection" style="display:none;">
            <h2>🗺️ 我们的地图</h2>
            <div id="mapContainer" style="height:500px;border-radius:12px;overflow:hidden;margin-bottom:12px;"></div>
            <div id="mapPhotoGrid" class="photo-grid" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;"></div>
            <div id="mapEmpty" style="display:none;text-align:center;padding:40px;color:#999;">
                <p>还没有带位置的照片</p>
                <small>上传照片时添加位置信息即可在地图上看到</small>
            </div>
        </section>

        <!-- 纪念日时间线 -->
        <section class="timeline-section" id="timelineSection" style="display:none;">
            <h2>💝 纪念日时间线</h2>
            <div id="daysCounter" style="text-align:center;padding:20px;background:linear-gradient(135deg,#ff9a9e 0%,#fad0c4 100%);border-radius:12px;color:white;margin-bottom:20px;">
                <div style="font-size:2.5rem;font-weight:bold;" id="daysCount">0</div>
                <div style="font-size:1rem;opacity:0.9;">我们在一起</div>
                <div style="margin-top:12px;">
                    <input type="date" id="startDateInput" onchange="window.updateStartDate()"
                           style="padding:6px 12px;border:none;border-radius:8px;font-size:14px;">
                </div>
            </div>
            <div id="timelineContainer" class="timeline-container"></div>
            <div style="text-align:center;margin-top:16px;">
                <button class="btn btn-primary" onclick="window.openAddMilestoneModal()">+ 添加纪念日</button>
            </div>
        </section>

        <button onclick="window.handleLogout()" class="btn btn-secondary" style="position:fixed;top:20px;right:20px;z-index:100;">退出登录</button>

        <!-- 照片浏览 -->
        <section class="photos-section">
            <div class="photos-header">
                <div class="photos-controls">
                    <input type="text" id="searchInput" placeholder="🔍 搜索照片...">
                    <div id="filterCategoryCascade" class="filter-cascade"></div>
                    <button id="selectModeBtn" onclick="window.toggleSelectMode()" class="btn btn-secondary">☑️ 多选</button>
                    <button id="selectAllBtn" onclick="window.selectAllPhotos()" class="btn btn-secondary" style="display:none;">全选</button>
                    <button id="batchCategoryBtn" onclick="window.openBatchCategoryModal()" class="btn btn-secondary" style="display:none;">📁 批量改分类</button>
                    <button id="batchLocationBtn" onclick="window.openBatchLocationModal()" class="btn btn-secondary" style="display:none;">📍 批量设位置</button>
                    <button id="batchDeleteBtn" onclick="window.batchDeletePhotos()" class="btn btn-danger" style="display:none;">🗑️ 删除 (<span id="selectedCount">0</span>)</button>
                    <button id="favoritesFilterBtn" onclick="window.toggleFavoritesFilter()" class="btn btn-secondary">❤️ 收藏</button>
                </div>
                <h2 id="photosTitle">照片浏览</h2>
            </div>
            <div id="photoGrid" class="photo-grid"></div>
            <div id="paginationContainer"></div>
            <div id="emptyState" class="empty-state" style="display:none;">
                <p>📭 暂无照片</p>
                <small>上传一些照片开始管理吧</small>
            </div>
        </section>
    </div>

    <!-- 照片详情弹窗 -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="window.closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h3 id="modalPhotoName"></h3>
                    <p id="modalPhotoDesc"></p>
                    <div class="modal-meta">
                        <span id="modalPhotoCategory" class="photo-category"></span>
                        <small id="modalPhotoSize"></small>
                    </div>
                    <div class="modal-actions">
                        <button id="favoriteBtn" onclick="window.toggleFavorite()" class="btn btn-secondary">🤍 收藏</button>
                        <a id="modalDownloadBtn" href="" download class="btn btn-primary">⬇️ 下载</a>
                        <button onclick="window.openEditModal()" class="btn btn-secondary">✏️ 编辑</button>
                        <button onclick="window.openCategoryModal()" class="btn btn-secondary">📁 改分类</button>
                    </div>
                    <div class="modal-comments">
                        <h4>留言</h4>
                        <div id="commentsList" class="comments-list"></div>
                        <form id="commentForm" onsubmit="window.addComment(event)">
                            <input type="text" id="commentInput" placeholder="写下你的留言...">
                            <button type="submit" class="btn btn-secondary">发送</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="window.closeEditModal()">&times;</span>
            <h3>编辑照片信息</h3>
            <form id="editForm" class="edit-form">
                <input type="hidden" id="editPhotoId">
                <div class="form-group">
                    <label for="editName">名称</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label for="editDesc">描述</label>
                    <textarea id="editDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="editLocationName">地点名称</label>
                    <input type="text" id="editLocationName">
                </div>
                <div class="form-row">
                    <input type="number" id="editLatitude" placeholder="纬度" step="any" style="flex:1;">
                    <input type="number" id="editLongitude" placeholder="经度" step="any" style="flex:1;">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 改分类弹窗 -->
    <div id="categoryModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="window.closeCategoryModal()">&times;</span>
            <h3>更改分类</h3>
            <p style="font-size:12px;color:#666;margin-bottom:10px;">可选择多个分类</p>
            <div class="category-select-list">
                <label class="category-option">
                    <input type="checkbox" id="noCategoryCheck">
                    <span>未分类</span>
                </label>
                <div id="categoryCheckboxList"></div>
            </div>
            <button onclick="window.saveCategoryChange()" class="btn btn-primary">保存</button>
        </div>
    </div>

    <!-- 编辑分类弹窗 -->
    <div id="editCategoryModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="window.closeEditCategoryModal()">&times;</span>
            <h3>编辑分类</h3>
            <form id="editCategoryForm" onsubmit="window.saveCategoryName(event)">
                <input type="hidden" id="editCategoryId">
                <div class="form-group">
                    <label for="editCategoryName">分类名称</label>
                    <input type="text" id="editCategoryName" required>
                </div>
                <div class="form-group">
                    <button type="button" id="editMarkBtn" onclick="toggleMarkInEdit()" style="background:none;border:1px solid #FFD700;color:#FFD700;padding:8px 16px;border-radius:8px;cursor:pointer;">☆ 标记</button>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 批量改分类弹窗 -->
    <div id="batchCategoryModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close" onclick="window.closeBatchCategoryModal()">&times;</span>
            <h3>批量更改分类</h3>
            <p style="font-size:12px;color:#666;margin-bottom:10px;">为选中的 <span id="batchPhotoCount">0</span> 张照片设置分类</p>
            <div class="category-select-list">
                <label class="category-option">
                    <input type="checkbox" id="batchNoCategory">
                    <span>设为未分类</span>
                </label>
                <div id="batchCategoryList"></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button onclick="batchAddCategories()" class="btn btn-primary" style="flex:1;">添加分类</button>
                <button onclick="batchRemoveCategories()" class="btn btn-danger" style="flex:1;">移除选中分类</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js?v=2"></script>
</body>
</html>
